<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- AEO & JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "ThiranOli",
      "alternateName": "திறனொளி",
      "url": "https://www.thiranoli.com",
      "logo": "https://www.thiranoli.com/logo.png",
      "description": "ThiranOli is a global skills ecosystem bringing world-class Robotics, AI, and Creative Coding education directly to your doorstep with verified expert mentors.",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "areaServed": "IN",
        "availableLanguage": ["Tamil", "English"]
      }
    }
    </script>

    <!-- Basic Fallback Title (Overridden by React Helmet) -->
    <title>ThiranOli</title>

    <!-- Google Fonts: Plus Jakarta Sans + Anek Tamil + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Anek+Tamil:wdth,wght@112.5,100..800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
